spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/medico_db?useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}

app.jwt.secret=${APP_JWT_SECRET:CHANGE_ME_SUPER_SECRET_256_BIT_KEY}
app.jwt.expiration-ms=86400000

app.otp.delivery=${APP_OTP_DELIVERY:EMAIL}
app.otp.expiration-minutes=5
app.consent.validity-minutes=1440

app.storage.type=LOCAL
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.base-url=${APP_BASE_URL:http://localhost:8080}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Email OTP (Brevo/SMTP)
spring.mail.host=${SPRING_MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_TRUST_HOST:smtp-relay.brevo.com}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ML Microservice
ml.service.url=${ML_SERVICE_URL:http://localhost:5000}

# Gemini Lifestyle Chat
ai.gemini.api-key=${AI_GEMINI_API_KEY:}
ai.gemini.model=gemini-1.5-flash

# File upload limits
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=25MB
